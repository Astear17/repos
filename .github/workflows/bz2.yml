Name: Auto Commit Changes

on:
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Download DEB files from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p downloaded_debs
          gh release download OWNER/REPO --pattern "*.deb" --dir downloaded_debs

      - name: Generate Packages
        run: |
          dpkg-scanpackages downloaded_debs > Packages

      - name: Force Recompress
        run: |
          rm -f Packages.bz2
          bzip2 -f Packages

      - name: Commit and Push
        run: |
          git add Packages.bz2
          git commit --allow-empty -m "Manual rebuild of Packages.bz2"
          git push
