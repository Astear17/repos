name: Auto Commit Changes

on:
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Download DEB files from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p downloaded_debs
          # Downloads from the 1.2.0 release specifically
          gh release download 1.2.0 --repo Astear17/Pure26 --pattern "*.deb" --dir downloaded_debs

      - name: Generate Packages
        run: |
          # Fetch the tag name for the URL rewrite
          LATEST_TAG=$(gh release view 1.2.0 --repo Astear17/Pure26 --json tagName --template '{{.tagName}}')
          
          # Install dpkg-dev to get dpkg-scanpackages
          sudo apt-get update && sudo apt-get install -y dpkg-dev
          
          dpkg-scanpackages downloaded_debs /dev/null > Packages
          
          # Replace local path with the direct GitHub download link
          sed -i "s|Filename: downloaded_debs/|Filename: https://github.com/Astear17/Pure26/releases/download/$LATEST_TAG/|g" Packages
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Force Recompress
        run: |
          bzip2 -c Packages > Packages.bz2

      - name: Commit and Push
        run: |
          git add Packages.bz2
          git commit --allow-empty -m "Rebuild Packages.bz2 for Sileo tag 1.2.0"
          git push
