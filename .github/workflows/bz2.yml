name: bz2

on:
  push:
    paths:
      - '**'   # watches all files; adjust if needed

jobs:
  compress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}
          fetch-depth: 2

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"

      - name: Compress files to .bz2
        run: |
          echo "Detecting changed files..."
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changes detected or first commit; compressing all non-.bz2 files."
            CHANGED_FILES=$(find . -type f ! -name '*.bz2')
          fi

          for FILE in $CHANGED_FILES; do
            if [[ $FILE == *.bz2 ]]; then continue; fi
            if [[ -f $FILE ]]; then
              echo "Compressing $FILE → $FILE.bz2"
              bzip2 -k -f "$FILE"
            fi
          done

      - name: Commit and push .bz2 files
        run: |
          git add *.bz2
          if ! git diff --cached --quiet; then
            git commit -m "Auto-compress .bz2 files [skip ci]"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:${{ github.ref }}
          else
            echo "No changes to .bz2 files. Skipping commit."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
