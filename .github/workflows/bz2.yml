name: Commit bz2 files

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  add-bz2:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Add .bz2 files
        run: |
          git add *.bz2 || true

      - name: Commit changes
        run: |
          git commit -m "Add bz2 files" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push
